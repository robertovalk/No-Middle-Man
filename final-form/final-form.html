<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Your Request | No Middle Man</title>
    <style>
        :root {
            --primary: #00b894;
            --dark: #2d3436;
            --light: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .form-container {
            background: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }

        .summary {
            background: #eefaf7;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            border-left: 5px solid var(--primary);
        }

        h2 { color: var(--dark); margin-top: 0; }
        
        .input-group { margin-bottom: 15px; }

        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn-send {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-send:hover { background: #00947a; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Finalize your Quote</h2>
    
    <div class="summary">
        <p><strong>Company:</strong> <span id="summary-contractor">---</span></p>
        <p><strong>Measurement:</strong> <span id="summary-area">0</span> sqft</p>
        <p><strong>Address:</strong> <span id="summary-address">---</span></p>
    </div>

    <form id="leadForm">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="nome" placeholder="Your name" required>
        </div>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com" required>
        </div>
        <div class="input-group">
            <label>Phone / WhatsApp</label>
            <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
        </div>

        <button type="submit" class="btn-send">Send to Contractor</button>
    </form>
</div>

<script>
    // 1. Recupera o "pacotão" de dados unificado
    const finalData = JSON.parse(localStorage.getItem('completeLeadData') || '{}');

    // Preenche o resumo visual na tela
    if (finalData) {
        document.getElementById('summary-contractor').innerText = finalData.contractor_name || "Not selected";
        document.getElementById('summary-area').innerText = finalData.area_sqft || "0";
        document.getElementById('summary-address').innerText = finalData.endereco_mapa || finalData.endereco || "Not provided";

        // AUTOPREENCHIMENTO: Pega o que foi digitado no modal inicial (index)
        document.getElementById('nome').value = finalData.nome || "";
        document.getElementById('email').value = finalData.email || "";
        document.getElementById('telefone').value = finalData.telefone || "";
    }

    // 2. Envio definitivo para o Banco de Dados
    document.getElementById('leadForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        // Monta o payload final combinando dados técnicos + inputs atuais
        const payload = {
            nome: document.getElementById('nome').value,
            email: document.getElementById('email').value,
            telefone: document.getElementById('telefone').value,
            endereco: finalData.endereco_mapa || finalData.endereco,
            area_sqft: finalData.area_sqft,
            squares: finalData.squares,
            pitch_factor: finalData.pitch_factor,
            contractor_id: finalData.contractor_id
        };

        try {
            const response = await fetch('http://localhost:3000/api/leads', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("✅ Success! Your information has been sent to the contractor.");
                localStorage.clear(); // Limpa para não misturar dados num próximo lead
                window.location.href = '../index.html'; // Volta para a home
            } else {
                const errorLog = await response.json();
                alert("❌ Error: " + (errorLog.error || "Check your database columns."));
            }
        } catch (error) {
            console.error("Erro fatal:", error);
            alert("❌ Connection error with the server.");
        }
    });
</script>

</body>
</html>
