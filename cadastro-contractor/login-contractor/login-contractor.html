<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Contractor Dashboard</title>
    <style>
        :root { 
            --primary-green: #10b981; 
            --dark-gray: #1a1a1a; 
            --light-bg: #f8fafc; 
            --border-color: #e2e8f0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--light-bg); 
            display: flex; 
            flex-direction: column; /* Para empilhar Navbar e Card */
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        /* --- NAVBAR (Igual às outras páginas) --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            background: white;
            border-bottom: 1px solid var(--border-color);
            width: 100%;
            box-sizing: border-box;
        }

        .logo {
            font-weight: 800;
            font-size: 1.25rem;
            text-transform: uppercase;
            color: var(--dark-gray);
        }

        .nav-links a {
            text-decoration: none;
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--dark-gray);
        }

        /* --- LOGIN CARD --- */
        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 400px; 
        }

        h2 { font-weight: 800; letter-spacing: -1px; margin-bottom: 1.5rem; text-align: center; }
        h2 span { color: var(--primary-green); }

        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
        label { font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        
        input { 
            padding: 14px; 
            border: 2px solid #f1f5f9; 
            border-radius: 10px; 
            background: #f8fafc; 
            font-size: 1rem; 
            transition: all 0.3s;
        }
        
        input:focus { 
            outline: none; 
            border-color: var(--primary-green); 
            background: white; 
        }

        .btn-login { 
            background: var(--dark-gray); 
            color: white; 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.2s; 
        }

        .btn-login:hover { 
            background: #000; 
            transform: translateY(-2px); 
        }

        .footer-link { text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #64748b; }
        .footer-link a { color: var(--primary-green); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<nav>
    <div class="logo">NO MIDDLE MAN</div>
    <div class="nav-links">
        <a href="../../index.html">Voltar para Home</a>
    </div>
</nav>

<div class="login-container">
    <div class="login-card">
        <h2>Contractor <span>Login</span></h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="senha" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">Acessar Painel</button>
        </form>
        <div class="footer-link">
            Não tem conta? <a href="../cadastro-contractor.html">Cadastre-se</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;

        try {
            const response = await fetch('http://localhost:3000/api/login-contractor', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha }) 
            });

            const result = await response.json();

            if (response.ok) {
                localStorage.setItem('contractorId', result.contractorId);
                localStorage.setItem('contractorNome', result.nome);
                
                alert('Login realizado com sucesso!');
                window.location.href = '../dashboard/dashboard.html';
            } else {
                alert('Erro: ' + result.error);
            }
        } catch (error) {
            console.error('Erro detalhado:', error);
            alert('Não foi possível conectar. Verifique se o terminal está rodando.');
        }
    });
</script>

</body>
</html>
