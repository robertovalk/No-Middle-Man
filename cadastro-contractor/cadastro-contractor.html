<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contractor Access - No Middle Man</title>
    <style>
        :root {
            --primary-green: #10b981; /* Verde esmeralda moderno */
            --dark-gray: #1a1a1a;
            --light-bg: #f8fafc;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            background-color: var(--light-bg);
            color: var(--dark-gray);
        }

        /* --- NAVBAR --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            background: white;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-weight: 800;
            font-size: 1.25rem;
            text-transform: uppercase;
        }

        .nav-links a {
            text-decoration: none;
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--dark-gray);
        }

        /* --- MAIN CONTENT --- */
        .container {
            max-width: 900px;
            margin: 4rem auto;
            padding: 0 1.5rem;
        }

        .header-section {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        h1 span {
            color: var(--primary-green);
        }

        /* Benefícios em formato de Pills */
        .benefits-tags {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .tag {
            background: white;
            border: 1px solid var(--border-color);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.85rem;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tag span {
            color: var(--primary-green);
            font-weight: bold;
        }

        /* FORM CARD MODIFICADO */
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid white;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .full-width { grid-column: span 2; }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
        }

        input, select {
            padding: 14px;
            border: 2px solid #f1f5f9;
            border-radius: 10px;
            background: #f8fafc;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-green);
            background: white;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        /* Estilo do Botão Principal */
        .footer-action {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .btn-submit {
            background: var(--dark-gray);
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-submit:hover {
            background: #000;
            transform: translateY(-2px);
        }

        .progress-stepper {
            width: 100%;
            height: 6px;
            background: #f1f5f9;
            border-radius: 10px;
        }

        .progress-fill {
            width: 40%;
            height: 100%;
            background: var(--primary-green);
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">NO MIDDLE MAN</div>
    <div class="nav-links">
        <a href="../index.html">Voltar para Home</a>
    </div>
</nav>

<div class="container">
    <div class="header-section">
        <h1>Scale your business with<br><span>Smart Infrastructure</span></h1>
        
        <div class="benefits-tags">
            <div class="tag"><span>✓</span> Instant Measurements</div>
            <div class="tag"><span>✓</span> High-Quality Leads</div>
            <div class="tag"><span>✓</span> Smart Dashboard</div>
            <div class="tag"><span>✓</span> No Setup Fee</div>
        </div>
    </div>

    <div class="form-card">
        <form class="form-grid">
            <div class="form-group full-width">
                <label>Company Identity</label>
                <input type="text" placeholder="Nome da sua empresa">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="(00) 00000-0000">
            </div>

            <div class="form-group">
                <label>License Number</label>
                <input type="text" placeholder="Registro Profissional">
            </div>

            <div class="form-group full-width">
                <label>Digital Presence</label>
                <input type="url" placeholder="https://seusite.com.br">
            </div>

            <div class="form-group full-width">
                <label>Lead Notification Email</label>
                <input type="email" placeholder="onde quer receber seus clientes?">
            </div>

            <div class="footer-action full-width">
                <div class="progress-stepper">
                    <div class="progress-fill"></div>
                </div>
                <button type="button" class="btn-submit">Criar minha conta de Contractor</button>
                <p style="font-size: 0.8rem; color: #94a3b8;">Passo 1 de 2: Informações Básicas</p>
            </div>
        </form>
    </div>
</div>

</body>
</html>
