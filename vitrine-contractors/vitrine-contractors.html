<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha sua Contractor | No Middle Man</title>
    <style>
        :root {
            --primary: #00b894;
            --dark: #2d3436;
            --light: #f9f9f9;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }

        h2 { font-size: 2.5rem; margin-bottom: 10px; }
        
        .info-bar {
            background: var(--white);
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--white);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .card h3 { margin-top: 0; color: var(--dark); }

        .card p { color: #636e72; font-size: 0.9rem; }

        .btn-select {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .btn-select:hover {
            background-color: #00947a;
        }

        /* Loading state */
        #loading { text-align: center; font-style: italic; }
    </style>
</head>
<body>

    <header>
        <h2>Select a Professional</h2>
        <div class="info-bar">
            📍 Address: <strong id="display-address">---</strong> | 
            🏠 Area: <strong id="display-sqft">0</strong> sqft
        </div>
    </header>

    <div id="loading">Searching for contractors in your area...</div>
    <div id="contractors-list" class="container"></div>

    <script>
// 1. Carrega as empresas assim que a página abre
    window.onload = async () => {
        try {
            const response = await fetch('http://localhost:3000/api/contractors');
            const contractors = await response.json();
            const container = document.getElementById('contractors-list'); // Garanta que esse ID existe no seu HTML

            if (contractors.length === 0) {
                container.innerHTML = "<p>Nenhuma empresa disponível no momento.</p>";
                return;
            }

            container.innerHTML = contractors.map(c => `
                <div class="contractor-card">
                    <h3>${c.nome_empresa}</h3>
                    <p>Licença: ${c.numero_licenca}</p>
                    <button class="btn-select" onclick="chooseContractor(${c.id}, '${c.nome_empresa}')">
                        Select Contractor
                    </button>
                </div>
            `).join('');
        } catch (err) {
            console.error("Erro ao carregar empresas:", err);
        }
    };

    // 2. Função para selecionar a empresa e ir para o formulário final
    function chooseContractor(id, name) {
        // Pega o pacotão de dados que veio do mapa
        const completeData = JSON.parse(localStorage.getItem('completeLeadData') || '{}');
        
        // Adiciona a empresa escolhida aos dados
        completeData.contractor_id = id;
        completeData.contractor_name = name;

        // Salva de novo com a empresa inclusa
        localStorage.setItem('completeLeadData', JSON.stringify(completeData));

        // Vai para a última etapa (ajuste o caminho se necessário)
        window.location.href = '../final-form/final-form.html';
    }
    </script>
</body>
</html>
